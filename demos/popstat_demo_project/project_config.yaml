project_name: popstat_demo_project
project_root: /n/groups/price/nuno/simmgr/demos/popstat_demo_project
simulator:
  arguments:
    params-json: true
    run-id: false
    param-set-id: false
    replicate: false
    attempt-id: false
    attempt: false
    seed: true
    log-path: true
    output-dir: false
  script: /n/groups/price/nuno/simmgr/demos/popstat_demo_simulator.py
  python_executable: /n/groups/price/nuno/.venv_py13/bin/python
randomness:
  project_seed: 123456
slurm:
  partition: short
  account: ""
  cpus_per_task: 1
  max_array_size: 1000
resources:
